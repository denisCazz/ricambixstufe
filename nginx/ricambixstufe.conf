# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.ricambixstufe.it ricambixstufe.it;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to Next.js container
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ricambixstufe.it ricambixstufe.it;

    # SSL certificates (Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/www.ricambixstufe.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.ricambixstufe.it/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    location / {
        proxy_pass http://127.0.0.1:3100;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, potential future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Cache static assets served by Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# WebSocket upgrade map (place in http block or include separately)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
